<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayHub - Hotel Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <script type="module" src="/src/main.js"></script>
  <header>
    <nav class="nav">
      <div class="logo">✨ StayHub</div>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#hotels">Hotels</a></li>
        <li><a href="#about">About</a></li>
      </ul>
      <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">☰</div>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-content">
      <h1>Find Your Perfect Stay in Delhi</h1>
      <p>20+ handpicked hotels across Delhi NCR</p>
      <div class="search-bar">
        <div class="search-field">
          <label>📅 Check-in</label>
          <input type="date" id="checkin" min="2026-02-26">
        </div>
        <div class="search-field">
          <label>📅 Check-out</label>
          <input type="date" id="checkout" min="2026-02-26">
        </div>
        <div class="search-field">
          <label>👥 Guests</label>
          <select id="guests">
            <option>1 Guest</option>
            <option selected>2 Guests</option>
            <option>3 Guests</option>
            <option>4 Guests</option>
          </select>
        </div>
        <button class="search-btn" onclick="filterHotels()">Search</button>
      </div>
    </div>
  </section>

  <section class="hotels" id="hotels">
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('luxury', this)">💎 Luxury</button>
      <button onclick="setFilter('mid', this)">🏨 Mid</button>
      <button onclick="setFilter('budget', this)">💰 Budget</button>
    </div>
    <div class="results" id="results">20 hotels found</div>
    <div class="hotels-grid" id="hotelsGrid"></div>
  </section>

  <section class="about" id="about">
    <h2>Why Book With StayHub?</h2>
    <div class="features">
      <div class="feature"><span>🎯</span><h4>Best Prices</h4></div>
      <div class="feature"><span>🛡️</span><h4>Verified Hotels</h4></div>
      <div class="feature"><span>💬</span><h4>24/7 Support</h4></div>
    </div>
  </section>

  <footer><p>© 2026 StayHub</p></footer>

  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeModal()">×</button>
      <img class="modal-image" id="modalImage" src="" alt="">
      <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p class="modal-location" id="modalLocation"></p>
        <div class="modal-amenities" id="modalAmenities"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="date-summary">
          <div class="date-box"><label>Check-in</label><input type="date" id="modalCheckin" min="2026-02-26"></div>
          <div class="date-box"><label>Check-out</label><input type="date" id="modalCheckout" min="2026-02-26"></div>
        </div>
        <div class="price-summary" id="priceSummary"></div>
        <button class="book-btn book-btn-full" id="bookBtn">Book Now →</button>
      </div>
    </div>
  </div>

</body>
</html>
