<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayHub - Hotel Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #6366f1; --primary-dark: #4f46e5; --accent: #f97316; --dark: #0f172a; --gray: #64748b; --light: #f8fafc; --white: #ffffff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; }
    header { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
    .nav { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.75rem; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; transition: color 0.3s; }
    .nav-links a:hover { color: var(--primary); }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; }
    .hero { min-height: 85vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%), url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=1920'); background-blend-mode: overlay; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--white); padding: 2rem; margin-top: 60px; }
    .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 1rem; font-weight: 700; }
    .hero p { font-size: 1.25rem; margin-bottom: 2.5rem; opacity: 0.9; }
    .search-bar { background: var(--white); padding: 1.5rem; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; max-width: 900px; }
    .search-field { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
    .search-field label { font-size: 0.8rem; font-weight: 600; color: var(--gray); margin-bottom: 0.5rem; }
    .search-field input, .search-field select { padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; transition: all 0.3s; background: var(--light); }
    .search-field input:focus, .search-field select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
    .search-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--white); border: none; padding: 1rem 2.5rem; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .search-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
    .hotels { padding: 4rem 2rem; max-width: 1400px; margin: 0 auto; }
    .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
    .filters button { padding: 0.75rem 1.5rem; border: 2px solid #e2e8f0; background: var(--white); color: var(--dark); border-radius: 50px; cursor: pointer; font-weight: 500; transition: all 0.3s; }
    .filters button.active, .filters button:hover { background: var(--primary); color: var(--white); border-color: var(--primary); }
    .results { text-align: center; color: var(--gray); margin-bottom: 2rem; }
    .hotels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
    .hotel-card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: all 0.4s; }
    .hotel-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .hotel-image { height: 220px; background-size: cover; background-position: center; position: relative; }
    .rating { position: absolute; top: 1rem; right: 1rem; background: var(--white); padding: 0.4rem 0.8rem; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
    .hotel-info { padding: 1.5rem; }
    .hotel-info h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
    .location { color: var(--gray); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .amenities { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .amenities span { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.75rem; color: var(--gray); }
    .description { color: var(--gray); font-size: 0.9rem; margin-bottom: 1rem; }
    .price-book { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid #e2e8f0; }
    .price .amount { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .price .per { color: var(--gray); font-size: 0.9rem; }
    .book-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--white); border: none; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .about { background: var(--dark); color: var(--white); padding: 5rem 2rem; text-align: center; }
    .about h2 { font-size: 2.5rem; margin-bottom: 3rem; }
    .features { display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap; }
    .feature { text-align: center; }
    .feature span { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .feature h4 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .feature p { color: var(--gray); }
    footer { background: #0f172a; color: var(--gray); padding: 2rem; text-align: center; border-top: 1px solid #1e293b; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--white); border-radius: 24px; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--light); font-size: 1.5rem; cursor: pointer; z-index: 1; }
    .modal-image { width: 100%; height: 250px; object-fit: cover; border-radius: 24px 24px 0 0; }
    .modal-content { padding: 1.5rem; }
    .modal h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .modal-location { color: var(--gray); margin-bottom: 1rem; }
    .modal-amenities { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .modal-amenities span { background: var(--light); padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; }
    .modal-desc { color: var(--gray); margin-bottom: 1.5rem; }
    .date-summary { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .date-box { flex: 1; }
    .date-box label { display: block; font-size: 0.8rem; color: var(--gray); margin-bottom: 0.3rem; }
    .date-box input { width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 10px; font-family: inherit; }
    .price-summary { background: var(--light); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
    .price-summary .total { font-size: 1.25rem; font-weight: 700; color: var(--primary); margin-top: 0.5rem; }
    .book-btn-full { width: 100%; padding: 1rem; font-size: 1.1rem; }
    @media (max-width: 768px) { .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--white); padding: 1rem 2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); } .nav-links.active { display: flex; } .menu-toggle { display: block; } .search-bar { flex-direction: column; } .search-field { width: 100%; } }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="logo">✨ StayHub</div>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#hotels">Hotels</a></li>
        <li><a href="#about">About</a></li>
      </ul>
      <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">☰</div>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-content">
      <h1>Find Your Perfect Stay in Delhi</h1>
      <p>20+ handpicked hotels across Delhi NCR</p>
      <div class="search-bar">
        <div class="search-field">
          <label>📅 Check-in</label>
          <input type="date" id="checkin" min="2026-02-26">
        </div>
        <div class="search-field">
          <label>📅 Check-out</label>
          <input type="date" id="checkout" min="2026-02-26">
        </div>
        <div class="search-field">
          <label>👥 Guests</label>
          <select id="guests">
            <option>1 Guest</option>
            <option selected>2 Guests</option>
            <option>3 Guests</option>
            <option>4 Guests</option>
          </select>
        </div>
        <button class="search-btn" onclick="filterHotels()">Search</button>
      </div>
    </div>
  </section>

  <section class="hotels" id="hotels">
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('luxury', this)">💎 Luxury</button>
      <button onclick="setFilter('mid', this)">🏨 Mid</button>
      <button onclick="setFilter('budget', this)">💰 Budget</button>
    </div>
    <div class="results" id="results">20 hotels found</div>
    <div class="hotels-grid" id="hotelsGrid"></div>
  </section>

  <section class="about" id="about">
    <h2>Why Book With StayHub?</h2>
    <div class="features">
      <div class="feature"><span>🎯</span><h4>Best Prices</h4></div>
      <div class="feature"><span>🛡️</span><h4>Verified Hotels</h4></div>
      <div class="feature"><span>💬</span><h4>24/7 Support</h4></div>
    </div>
  </section>

  <footer><p>© 2026 StayHub</p></footer>

  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeModal()">×</button>
      <img class="modal-image" id="modalImage" src="" alt="">
      <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p class="modal-location" id="modalLocation"></p>
        <div class="modal-amenities" id="modalAmenities"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="date-summary">
          <div class="date-box"><label>Check-in</label><input type="date" id="modalCheckin" min="2026-02-26"></div>
          <div class="date-box"><label>Check-out</label><input type="date" id="modalCheckout" min="2026-02-26"></div>
        </div>
        <div class="price-summary" id="priceSummary"></div>
        <button class="book-btn book-btn-full" id="bookBtn">Book Now →</button>
      </div>
    </div>
  </div>

  <script>
    const hotels = [
      {id:1,name:"The Leela Palace",rating:4.9,price:15000,image:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800",location:"Chanakyapuri",amenities:["Pool","Spa","Restaurant","WiFi","Gym"],description:"Luxury palace hotel near diplomatic enclave",booking:"https://www.theleela.com/the-leela-palace-new-delhi/"},
      {id:2,name:"Taj Palace Hotel",rating:4.7,price:12000,image:"https://images.unsplash.com/photo-1582719508461-905c673771fd?w=800",location:"Sardar Patel Marg",amenities:["Pool","Spa","Restaurant","WiFi","Parking"],description:"Iconic 5-star in the heart of Delhi",booking:"https://www.tajhotels.com/en-in/taj-palace-new-delhi/"},
      {id:3,name:"The Oberoi",rating:4.8,price:18000,image:"https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=800",location:"Dr. Zakir Hussain Marg",amenities:["Pool","Spa","Restaurant","WiFi","Butler"],description:"Ultimate luxury in New Delhi",booking:"https://www.oberoihotels.com/hotels-in-new-delhi/"},
      {id:4,name:"ITC Maurya",rating:4.6,price:9500,image:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800",location:"Sardar Patel Marg",amenities:["Pool","Restaurant","WiFi","Gym","Bar"],description:"Award-winning luxury hotel",booking:"https://www.itchotels.com/in/ittc-maurya-new-delhi/"},
      {id:5,name:"The Grand Palace",rating:4.5,price:8500,image:"https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=800",location:"Connaught Place",amenities:["Restaurant","WiFi","Parking","Gym"],description:"Classic elegance in city center",booking:"https://www.thegrandhotels.com/"},
      {id:6,name:"Hyatt Regency",rating:4.4,price:7500,image:"https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=800",location:"Bhikaji Cama Place",amenities:["Pool","Spa","Restaurant","WiFi","Gym"],description:"Modern luxury in Delhi",booking:"https://www.hyatt.com/en-US/hotel/india/hyatt-regency-new-delhi/delrz"},
      {id:7,name:"Le Meridian",rating:4.3,price:6500,image:"https://images.unsplash.com/photo-1564501049412-61c2a3083791?w=800",location:"Janpath",amenities:["Pool","Restaurant","WiFi","Parking"],description:"Elegant stay at Janpath",booking:"https://www.marriott.com/en-us/hotels/delap-le-meridien-new-delhi/overview/"},
      {id:8,name:"Radisson Blu",rating:4.2,price:5500,image:"https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800",location:"Paschim Vihar",amenities:["Pool","Restaurant","WiFi","Gym"],description:"Comfortable stay in West Delhi",booking:"https://www.radissonhotels.com/en-us/hotels/delhi-radisson-blu"},
      {id:9,name:"Holiday Inn",rating:4.1,price:4500,image:"https://images.unsplash.com/photo-1584132967334-10e028bd69f7?w=800",location:"Mayur Vihar",amenities:["Restaurant","WiFi","Parking","Pool"],description:"Great value for families",booking:"https://www.ihg.com/holidayinn/hotels/us/en/delhi/delhi/hoteldetail"},
      {id:10,name:"The Pride Hotel",rating:4.0,price:3800,image:"https://images.unsplash.com/photo-1596394516093-501ba68a0ba6?w=800",location:"Central Vista",amenities:["Restaurant","WiFi","Parking"],description:"Business hotel in center",booking:"https://www.pridehotel.com/delhi/"},
      {id:11,name:"Hotel City Palace",rating:3.9,price:2800,image:"https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=800",location:"Paharganj",amenities:["WiFi","Restaurant","Parking"],description:"Budget-friendly near railway station",booking:"https://www.hotelcitypalacedelhi.com/"},
      {id:12,name:"Bloomrooms New Delhi",rating:4.2,price:3200,image:"https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=800",location:"Janpath",amenities:["WiFi","Restaurant"],description:"Stylish budget boutique",booking:"https://www.bloomrooms.com/"},
      {id:13,name:"Treetop Hotel",rating:3.8,price:2200,image:"https://images.unsplash.com/photo-1595576508898-0ad5c879a061?w=800",location:"Karol Bagh",amenities:["WiFi","Parking"],description:"Affordable stay in Karol Bagh",booking:"https://www.treetophotel.com/"},
      {id:14,name:"FabHotel Stay",rating:4.1,price:2500,image:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800",location:"Multiple Locations",amenities:["WiFi","AC"],description:"Consistent quality across Delhi",booking:"https://www.fabhotels.com/"},
      {id:15,name:"Treebo Trend",rating:4.0,price:2300,image:"https://images.unsplash.com/photo-1560185893-a55cbc8c57e8?w=800",location:"Various Areas",amenities:["WiFi","Breakfast","AC"],description:"Quality budget accommodations",booking:"https://www.treebo.com/"},
      {id:16,name:"OYO Rooms",rating:3.9,price:1500,image:"https://images.unsplash.com/photo-1606046604972-77cc76aee944?w=800",location:"All Over Delhi",amenities:["WiFi","AC"],description:"Budget stays everywhere",booking:"https://www.oyorooms.com/"},
      {id:17,name:"Z Hotel",rating:4.3,price:5200,image:"https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=800",location:"Nehru Place",amenities:["Pool","Restaurant","WiFi","Gym"],description:"Modern hotel in South Delhi",booking:"https://www.zhotels.in/"},
      {id:18,name:"Country Inn",rating:4.1,price:4200,image:"https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=800",location:"Rohini",amenities:["Pool","Restaurant","WiFi","Parking"],description:"Comfort in North Delhi",booking:"https://www.countryinn.in/"},
      {id:19,name:"Royal Rose Hotel",rating:4.4,price:5800,image:"https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800",location:"Maharani Bagh",amenities:["Spa","Restaurant","WiFi","Pool"],description:"Beautiful boutique hotel",booking:"https://www.royalrosehotel.com/"},
      {id:20,name:"Skyline Hotel",rating:4.2,price:4800,image:"https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=800",location:"Dwarka",amenities:["Restaurant","WiFi","Gym","Parking"],description:"Modern stay in Dwarka",booking:"https://www.skylinehoteldelhi.com/"}
    ];

    let currentFilter = 'all';

    function renderHotels() {
      const filtered = currentFilter === 'all' ? hotels : 
        hotels.filter(h => currentFilter === 'luxury' && h.price >= 8000 ||
                          currentFilter === 'mid' && h.price >= 3000 && h.price < 8000 ||
                          currentFilter === 'budget' && h.price < 3000);
      document.getElementById('results').textContent = filtered.length + ' hotels found';
      document.getElementById('hotelsGrid').innerHTML = filtered.map(h => `
        <div class="hotel-card">
          <div class="hotel-image" style="background-image: url('${h.image}')">
            <span class="rating">⭐ ${h.rating}</span>
          </div>
          <div class="hotel-info">
            <h3>${h.name}</h3>
            <p class="location">📍 ${h.location}</p>
            <div class="amenities">${h.amenities.slice(0,4).map(a => `<span>${a}</span>`).join('')}</div>
            <p class="description">${h.description}</p>
            <div class="price-book">
              <div class="price"><span class="amount">₹${h.price.toLocaleString()}</span><span class="per">/night</span></div>
              <button class="book-btn" onclick="openModal(${h.id})">View Deal →</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function setFilter(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderHotels();
    }

    function filterHotels() { renderHotels(); }

    let selectedHotel = null;

    function openModal(id) {
      selectedHotel = hotels.find(h => h.id === id);
      document.getElementById('modalImage').src = selectedHotel.image;
      document.getElementById('modalTitle').textContent = selectedHotel.name;
      document.getElementById('modalLocation').textContent = '📍 ' + selectedHotel.location;
      document.getElementById('modalAmenities').innerHTML = selectedHotel.amenities.map(a => `<span>${a}</span>`).join('');
      document.getElementById('modalDesc').textContent = selectedHotel.description;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('active');
      }
    }

    document.getElementById('modalCheckin').addEventListener('change', function() {
      const cin = this.value;
      const cout = document.getElementById('modalCheckout');
      if (cin && cout.value && new Date(cout.value) <= new Date(cin)) {
        const next = new Date(cin);
        next.setDate(next.getDate() + 1);
        cout.value = next.toISOString().split('T')[0];
      }
      updatePrice();
    });

    document.getElementById('modalCheckout').addEventListener('change', updatePrice);

    function updatePrice() {
      const cin = document.getElementById('modalCheckin').value;
      const cout = document.getElementById('modalCheckout').value;
      if (cin && cout && selectedHotel) {
        const nights = Math.ceil((new Date(cout) - new Date(cin)) / (1000*60*60*24));
        if (nights > 0) {
          document.getElementById('priceSummary').innerHTML = `
            <p>₹${selectedHotel.price} × ${nights} night${nights>1?'s':''}</p>
            <p class="total">Total: ₹${(selectedHotel.price * nights).toLocaleString()}</p>
          `;
          return;
        }
      }
      document.getElementById('priceSummary').innerHTML = '';
    }

    document.getElementById('bookBtn').addEventListener('click', function() {
      if (!selectedHotel) return;
      window.open(selectedHotel.booking, '_blank');
      closeModal();
    });

    renderHotels();
  </script>
</body>
</html>
